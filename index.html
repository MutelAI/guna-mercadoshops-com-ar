<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO meta tags are dynamically set by the app from business.json -->
    <title>Ciudad Guna - Centro de Bienestar en Córdoba</title>
    <meta name="robots" content="index, follow" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preload business data (starts in parallel with JS bundle) -->
    <link rel="preload" href="/data/business.json" as="fetch" crossorigin />
    <script>
      // Start fetching JSON immediately — before Angular even loads
      window.__bizData = fetch('/data/business.json').then(r => r.json());
    </script>

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts (non-render-blocking) -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Inter:wght@300;400;500;700;900&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet" /></noscript>

    <link rel="stylesheet" href="/src/styles.css" />
      <meta name="description" content="Centro de bienestar Ciudad Guna en Laguna Larga, Córdoba. Un paraíso natural con terapias holísticas, meditación y masajes en un hermoso parque con plantas y estanques." />
      <meta name="keywords" content="centro bienestar córdoba, terapias naturales, meditación, masajes, laguna larga, relajación, wellness center, spa natural córdoba" />
  </head>
  <body>
    <app-root></app-root>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
